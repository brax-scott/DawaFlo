<div class="overflow-x-auto max-h-[400px]">
    <table class="w-full text-left">
        <thead class="bg-slate-800 text-white sticky top-0">
            <tr>
                <th class="p-4 text-xs font-black uppercase tracking-wider">Dawa</th>
                <th class="p-4 text-xs font-black uppercase tracking-wider text-right">Bei</th>
                <th class="p-4 text-xs font-black uppercase tracking-wider text-center">Expiry</th>
                <th class="p-4 text-center">Action</th>
            </tr>
        </thead>
        <tbody id="inventoryBody" class="divide-y divide-slate-100"></tbody>
    </table>
</div>

<script>
    const FIREBASE_URL = "https://dawaflo-a3926-default-rtdb.firebaseio.com/mauzo";

    // --- KAZI YA KUTENGENEZA RISITI ---
    function printReceipt(item) {
        const receiptWindow = window.open('', '_blank', 'width=300,height=450');
        receiptWindow.document.write(`
            <html>
                <head>
                    <title>DawaFlo Receipt</title>
                    <style>
                        body { font-family: 'Courier New', Courier, monospace; padding: 20px; text-align: center; }
                        .line { border-bottom: 1px dashed #000; margin: 10px 0; }
                        .header { font-weight: bold; font-size: 18px; }
                        .details { text-align: left; font-size: 14px; margin-top: 15px; }
                        .footer { margin-top: 20px; font-size: 12px; font-style: italic; }
                    </style>
                </head>
                <body>
                    <div class="header">DAWAFLO PHARMACY</div>
                    <div class="line"></div>
                    <div class="details">
                        <b>TAREHE:</b> ${new Date().toLocaleDateString()}<br>
                        <b>Muda:</b> ${new Date().toLocaleTimeString()}<br><br>
                        <b>DAWA:</b> ${item.dawa}<br>
                        <b>BEI:</b> TSH ${parseInt(item.bei).toLocaleString()}/=<br>
                        <b>EXPIRY:</b> ${item.expiry || 'S/A'}
                    </div>
                    <div class="line"></div>
                    <div class="footer">Asante kwa kuthamini afya yako.<br>KARIBU TENA!</div>
                    <script>window.print(); window.close();<\/script>
                </body>
            </html>
        `);
        receiptWindow.document.close();
    }

    // --- KAZI YA KUONYESHA DATA NA VITUFE ---
    async function onyeshaData() {
        const body = document.getElementById('inventoryBody');
        try {
            const res = await fetch(`${FIREBASE_URL}.json`);
            const items = await res.json();
            body.innerHTML = '';
            let totalRev = 0;
            let count = 0;

            if(items) {
                Object.keys(items).reverse().forEach(key => {
                    const item = items[key];
                    totalRev += item.bei;
                    count++;
                    body.innerHTML += `
                        <tr class="hover:bg-emerald-50 border-b">
                            <td class="p-4 font-bold text-slate-700">${item.dawa}</td>
                            <td class="p-4 text-right font-mono text-emerald-600 font-black">${item.bei.toLocaleString()}</td>
                            <td class="p-4 text-center text-xs text-red-500 font-bold">${item.expiry || '-'}</td>
                            <td class="p-4 text-center space-x-2">
                                <button onclick='printReceipt(${JSON.stringify(item)})' class="text-blue-500 hover:text-blue-700" title="Risiti">
                                    <i class="fas fa-print"></i>
                                </button>
                                <button onclick="futaRekodi('${key}')" class="text-slate-300 hover:text-red-500">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
            }
            document.getElementById('totalItems').innerText = count;
            document.getElementById('totalRevenue').innerText = totalRev.toLocaleString();
        } catch (e) { console.error(e); }
    }

    // (Hapa ongeza zile function zingine za ongezaDawa na futaRekodi kama tulivyofanya mwanzo)
    window.onload = onyeshaData;
</script>
