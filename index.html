<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DawaFlo | Smart Pharmacy System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f8fafc; font-family: 'Inter', sans-serif; }
        .header-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
    </style>
</head>
<body class="p-4 md:p-6">

    <div class="max-w-6xl mx-auto">
        <div class="header-gradient p-6 rounded-3xl shadow-2xl text-white mb-8 flex justify-between items-center border-b-4 border-emerald-500">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tighter uppercase">DAWA<span class="text-emerald-400">FLO</span></h1>
                <p class="text-xs font-medium opacity-70 uppercase tracking-widest text-emerald-100">Cloud Management System</p>
            </div>
            <div class="bg-emerald-500/20 p-3 rounded-2xl border border-emerald-500/30">
                <i class="fas fa-microchip text-emerald-400 text-xl"></i>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 relative">
                <p class="text-slate-500 text-xs font-bold uppercase mb-1">Aina za Dawa</p>
                <h2 id="totalItems" class="text-4xl font-black text-slate-800">0</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-slate-500 text-xs font-bold uppercase mb-1">Mauzo Leo (Tsh)</p>
                <h2 id="totalRevenue" class="text-4xl font-black text-emerald-600">0</h2>
            </div>
            <div class="bg-emerald-600 p-6 rounded-2xl shadow-lg text-white">
                <p class="opacity-80 text-xs font-bold uppercase mb-1">Hali ya Cloud</p>
                <h2 class="text-xl font-bold flex items-center">
                    <span class="w-3 h-3 bg-white rounded-full mr-2 animate-pulse"></span> ONLINE
                </h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 bg-white p-6 rounded-3xl shadow-xl border border-slate-100">
                <h3 class="text-lg font-bold text-slate-800 mb-6 flex items-center"><i class="fas fa-plus-circle text-emerald-500 mr-2"></i> Ingiza Mauzo</h3>
                <div class="space-y-5">
                    <input type="text" id="dawa" placeholder="Jina la Dawa" class="w-full p-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-emerald-500">
                    <input type="number" id="bei" placeholder="Bei (Tsh)" class="w-full p-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-emerald-500 font-mono">
                    <input type="date" id="expiry" class="w-full p-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-emerald-500">
                    <button id="saveBtn" onclick="ongezaDawa()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 rounded-2xl shadow-lg transition-all">
                        HIFADHI CLOUD
                    </button>
                </div>
            </div>

            <div class="lg:col-span-8 bg-white p-6 rounded-3xl shadow-xl border border-slate-100">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-lg font-bold text-slate-800">Rekodi za Stoo</h3>
                    <button onclick="onyeshaData()" class="text-emerald-600 text-sm font-bold hover:underline">Refresh <i class="fas fa-sync-alt ml-1 text-xs"></i></button>
                </div>
                <div class="overflow-x-auto max-h-[400px]">
                    <table class="w-full text-left">
                        <thead class="bg-slate-800 text-white sticky top-0">
                            <tr>
                                <th class="p-4 text-xs font-black uppercase tracking-wider">Dawa</th>
                                <th class="p-4 text-xs font-black uppercase tracking-wider text-right">Bei</th>
                                <th class="p-4 text-xs font-black uppercase tracking-wider text-center">Expiry</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryBody" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // KIUNGO KIKUU CHA DAWAFLO NA FIREBASE
        const FIREBASE_URL = "https://dawaflo-a3926-default-rtdb.firebaseio.com/mauzo.json";

        async function ongezaDawa() {
            const dawa = document.getElementById('dawa').value;
            const bei = document.getElementById('bei').value;
            const expiry = document.getElementById('expiry').value;
            const btn = document.getElementById('saveBtn');

            if(!dawa || !bei) { alert('Jaza Jina na Bei!'); return; }

            btn.disabled = true;
            btn.innerText = "INAHIFADHI...";

            try {
                await fetch(FIREBASE_URL, {
                    method: 'POST',
                    body: JSON.stringify({ dawa, bei: parseInt(bei), expiry, time: new Date().toLocaleString() })
                });
                
                document.getElementById('dawa').value = '';
                document.getElementById('bei').value = '';
                onyeshaData();
                alert("✅ Imefanikiwa!");
            } catch (err) {
                alert("Hitilafu: " + err);
            } finally {
                btn.disabled = false;
                btn.innerText = "HIFADHI CLOUD";
            }
        }

        async function onyeshaData() {
            const body = document.getElementById('inventoryBody');
            try {
                const res = await fetch(FIREBASE_URL);
                const items = await res.json();
                
                body.innerHTML = '';
                let totalRev = 0;
                let count = 0;

                if(items) {
                    Object.keys(items).reverse().forEach(key => {
                        const item = items[key];
                        totalRev += item.bei;
                        count++;
                        body.innerHTML += `
                            <tr class="hover:bg-emerald-50">
                                <td class="p-4 font-bold text-slate-700">${item.dawa}</td>
                                <td class="p-4 text-right font-mono text-emerald-600 font-black">${item.bei.toLocaleString()}</td>
                                <td class="p-4 text-center font-bold text-red-500 text-xs">${item.expiry || '-'}</td>
                            </tr>
                        `;
                    });
                }
                document.getElementById('totalItems').innerText = count;
                document.getElementById('totalRevenue').innerText = totalRev.toLocaleString();
            } catch (e) { console.error(e); }
        }

        window.onload = onyeshaData;
    </script>
</body>
</html>
